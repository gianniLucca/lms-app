      if(w>mw){h2=Math.round(h2*mw/w);w=mw;}
      if(h2>mh){w=Math.round(w*mh/h2);h2=mh;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h2;
      cv.getContext('2d').drawImage(img,0,0,w,h2);
      res(cv.toDataURL('image/jpeg',q));
    };
    img.onerror=rej;img.src=d;
  });
}

async function buildPDF(chk,cust,lang){

  doc.setFontSize(10);doc.setFont('helvetica','bold');

  doc.text(rpt,M,24);
  if(S.settings.logo){try{doc.addImage(S.settings.logo,'JPEG',W-M-22,3,22,22,'','FAST');}catch(e){}}
  y=38;
  doc.setFillColor(12,25,41);doc.setDrawColor(30,58,82);doc.roundedRect(M,y,W-M*2,46,3,3,'FD');
  var bn=cust.boat_name||cust.boatName||'-';var bm=cust.boat_model||cust.boatModel||'-';
  var info=[[lang==='de'?'Datum':lang==='en'?'Date':'Fecha',fmt(chk.date)],['Boot/Boat',bn],[lang==='de'?'Modell':'Model',bm],[lang==='de'?'Hafen':lang==='en'?'Marina':'Puerto',cust.harbor||'-'],[lang==='de'?'Kunde':lang==='en'?'Customer':'Cliente',cust.name||'-'],['Tel',cust.phone||'-'],[lang==='de'?'Plan':'Plan',pd(cust.plan).name],['Intervall',cust.interval||'-']];
  var cW=(W-M*2-8)/3;
  for(var i=0;i<info.length;i++){var col=i%3,row=Math.floor(i/3),x=M+4+col*cW,iy=y+7+row*14;doc.setTextColor(77,122,150);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text(info[i][0].toUpperCase(),x,iy);doc.setTextColor(232,244,248);doc.setFontSize(9);doc.text(String(info[i][1]).substring(0,26),x,iy+5.5);}

  doc.setFillColor(aR,aG,aB);doc.rect(M,y,W-M*2,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
  var listLbl=lang==='en'?'CHECKLIST':lang==='es'?'LISTA DE CONTROL':'CHECKLISTE';
  doc.text(listLbl,M+4,y+5.5);
  var done=chk.items.filter(function(i){return i.checked;}).length;
  doc.text(done+'/'+chk.items.length,W-M-4,y+5.5,'right');
  y+=10;
  for(var ii=0;ii<chk.items.length;ii++){
    var item=chk.items[ii];
    if(y>268){doc.addPage();y=15;}
    doc.setFillColor(item.checked?10:18,item.checked?32:42,item.checked?51:64);doc.rect(M,y,W-M*2,8,'F');
    if(item.checked){doc.setFillColor(aR,aG,aB);doc.roundedRect(M+3,y+1.8,4.5,4.5,1,1,'F');doc.setTextColor(255,255,255);doc.setFontSize(7);doc.text('✓',M+3.7,y+6);}
    else{doc.setDrawColor(30,58,82);doc.roundedRect(M+3,y+1.8,4.5,4.5,1,1,'D');}
    doc.setTextColor(item.checked?100:220,item.checked?140:235,item.checked?165:245);doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.text((item.label||'').substring(0,62),M+11,y+5.5);
    if(item.photos&&item.photos.length){doc.setTextColor(aR,aG,aB);doc.setFontSize(7);doc.text('📷'+item.photos.length,W-M-4,y+5.5,'right');}
    y+=9;
    if(item.photos&&item.photos.length){
      var PW=52,PH=39,GAP=3,perRow=Math.floor((W-M*2+GAP)/(PW+GAP));
      var px=M,photoY=y+2;
      for(var pi=0;pi<item.photos.length;pi++){
        if(pi>0&&pi%perRow===0){px=M;photoY+=PH+GAP+2;}
        if(photoY+PH>270){doc.addPage();y=15;photoY=y;px=M;}
        try{var cp=await compress(item.photos[pi],400,300,0.65);doc.addImage(cp,'JPEG',px,photoY,PW,PH,'','FAST');}catch(e){try{doc.addImage(item.photos[pi],'JPEG',px,photoY,PW,PH,'','FAST');}catch(e2){}}

  if(chk.genNote&&chk.genNote.trim()){
    if(y>255){doc.addPage();y=15;}
    doc.setFillColor(aR,aG,aB);doc.rect(M,y,W-M*2,8,'F');doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
    var noteLbl=lang==='en'?'NOTE':lang==='es'?'NOTA':'NOTIZ';
    doc.text(noteLbl,M+4,y+5.5);y+=10;
    doc.setFillColor(18,32,53);doc.rect(M,y,W-M*2,22,'F');doc.setTextColor(232,244,248);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(doc.splitTextToSize(chk.genNote,W-M*2-8).slice(0,5),M+4,y+6);y+=26;
  }
  if(y>235){doc.addPage();y=15;}y+=12;
  var hw=(W-M*2-10)/2;
  doc.setDrawColor(30,58,82);doc.setLineWidth(0.4);doc.line(M,y+18,M+hw,y+18);doc.line(M+hw+10,y+18,M+hw*2+10,y+18);
  doc.setTextColor(77,122,150);doc.setFontSize(8);
  var sig1=lang==='en'?'Technician Signature':lang==='es'?'Firma Técnico':'Unterschrift Techniker';
  var sig2=lang==='en'?'Customer Signature':lang==='es'?'Firma Cliente':'Unterschrift Kunde';
  doc.text(sig1,M,y+24);doc.text(sig2,M+hw+10,y+24);
  var pages=doc.internal.getNumberOfPages();
  for(var pg=1;pg<=pages;pg++){doc.setPage(pg);doc.setFillColor(9,18,30);doc.rect(0,287,W,10,'F');doc.setTextColor(77,122,150);doc.setFontSize(7);doc.text((S.settings.companyName||'')+' · '+(S.settings.email||''),M,293);doc.text(pg+'/'+pages,W-M,293,'right');}
  var fname='LMS_'+((cust.boat_name||cust.boatName||cust.name||'report').replace(/[^a-zA-Z0-9]/g,'_'))+'_'+chk.date+'.pdf';
  return{blob:doc.output('blob'),name:fname};
}

  uc.appendChild(h('div',{cls:'btn bd',style:{padding:'8px 12px',fontSize:'12px'},on:{click:async function(){await SB.auth.signOut();}}},'Abmelden'));
  w.appendChild(uc);
  w.appendChild(h('div',{cls:'st'},'Firma'));
  var cc=h('div',{cls:'card',style:{padding:'14px',marginBottom:'16px'}});
  var li2=document.createElement('input');li2.type='file';li2.accept='image/*';li2.style.display='none';
  li2.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=async function(ev){S.settings.logo=ev.target.result;await saveSettings();render();};r.readAsDataURL(f);});
  var lp=S.settings.logo?h('img',{src:S.settings.logo,style:{width:'52px',height:'52px',borderRadius:'10px',objectFit:'cover'}}):h('div',{style:{width:'52px',height:'52px',borderRadius:'10px',background:'var(--b3)',display:'flex',alignItems:'center',justifyContent:'center'},html:IC.anchor});
  var lr=h('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px',flexWrap:'wrap'}},lp);
  lr.appendChild(h('div',{cls:'btn bs',on:{click:function(){li2.click();}}},'Logo ändern'));
  if(S.settings.logo)lr.appendChild(h('div',{cls:'btn bg',style:{color:'var(--er)'},on:{click:async function(){S.settings.logo=null;await saveSettings();render();}}},'Entfernen'));
  lr.appendChild(li2);cc.appendChild(lr);
  function sf(lbl,key,type){
    var fg=h('div',{cls:'fg'});fg.appendChild(h('label',{cls:'fl'},lbl));var inp=h('input',{cls:'fi',type:type||'text',value:S.settings[key]||''});
    var st=null;inp.addEventListener('input',function(e){S.settings[key]=e.target.value;clearTimeout(st);st=setTimeout(saveSettings,1200);});fg.appendChild(inp);cc.appendChild(fg);
  }
  sf('Firmenname','companyName');sf('Inhaber','ownerName');
  var r2=h('div',{cls:'fr'});
  ['phone','email'].forEach(function(k){
    var fg=h('div',{cls:'fg'});fg.appendChild(h('label',{cls:'fl'},k==='phone'?'Telefon':'E-Mail'));
    var inp=h('input',{cls:'fi',type:k==='phone'?'tel':'email',value:S.settings[k]||''});
    var st=null;inp.addEventListener('input',function(e){S.settings[k]=e.target.value;clearTimeout(st);st=setTimeout(saveSettings,1200);});fg.appendChild(inp);r2.appendChild(fg);
  });
  cc.appendChild(r2);
  var cfg=h('div',{cls:'fg'});cfg.appendChild(h('label',{cls:'fl'},'Akzentfarbe'));
  var cr=h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
  var ci2=h('input',{type:'color',value:S.settings.accentColor||'#0d9488',style:{width:'44px',height:'36px',border:'none',background:'none',cursor:'pointer',borderRadius:'6px'}});
  var cl=h('span',{style:{fontSize:'13px',color:'var(--t3)'}},S.settings.accentColor);
  ci2.addEventListener('input',function(e){S.settings.accentColor=e.target.value;document.documentElement.style.setProperty('--ac',e.target.value);cl.textContent=e.target.value;});
  ci2.addEventListener('change',saveSettings);cr.appendChild(ci2);cr.appendChild(cl);cfg.appendChild(cr);cc.appendChild(cfg);w.appendChild(cc);
  w.appendChild(h('div',{cls:'st'},'Sprache'));
  var lc2=h('div',{cls:'card',style:{padding:'14px',marginBottom:'16px'}});
  var lfg=h('div',{cls:'fg',style:{marginBottom:'0'}});lfg.appendChild(h('label',{cls:'fl'},'App-Sprache'));
  var lsel=h('select',{cls:'fi'});[['de','🇩🇪 Deutsch'],['en','🇬🇧 English'],['es','🇪🇸 Español']].forEach(function(l){var o=h('option',{value:l[0]},l[1]);if(S.settings.language===l[0])o.selected=true;lsel.appendChild(o);});
  lsel.addEventListener('change',async function(e){S.settings.language=e.target.value;await saveSettings();render();});lfg.appendChild(lsel);lc2.appendChild(lfg);w.appendChild(lc2);
  w.appendChild(h('div',{cls:'st'},'Sicherheit'));
  var sc=h('div',{cls:'card',style:{padding:'14px',marginBottom:'16px'}});
  var pf=h('div',{cls:'fg',style:{marginBottom:'12px'}});pf.appendChild(h('label',{cls:'fl'},'Techniker-PIN (4-stellig)'));
  var pi=h('input',{cls:'fi',type:'password',maxlength:'4',value:S.settings.techPin||'1234'});
  var pt=null;pi.addEventListener('input',function(e){S.settings.techPin=e.target.value;clearTimeout(pt);pt=setTimeout(saveSettings,1200);});pf.appendChild(pi);sc.appendChild(pf);
  sc.appendChild(h('div',{cls:'btn bd',on:{click:function(){set({isAdmin:false});}}},[ic('lock',{color:'var(--er)'}),' Techniker-Modus']));w.appendChild(sc);
  w.appendChild(h('div',{cls:'st'},'Service-Pläne'));
  Object.keys(S.plans).forEach(function(pk){
    var plan=S.plans[pk];var card=h('div',{cls:'card',style:{marginBottom:'10px'}});
    var ph=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'12px 14px',borderBottom:'1px solid var(--br)'}});
    ph.appendChild(h('div',{style:{width:'28px',height:'28px',borderRadius:'7px',background:plan.color+'22',color:plan.color,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fd)',fontWeight:'800',fontSize:'13px',flexShrink:'0'}},pk));
    var ni=h('input',{cls:'fi',value:plan.name||'',style:{flex:'1',padding:'6px 8px',fontSize:'13px'}});var nt=null;ni.addEventListener('input',function(e){S.plans[pk].name=e.target.value;clearTimeout(nt);nt=setTimeout(saveSettings,1200);});ph.appendChild(ni);
    var colI=h('input',{type:'color',value:plan.color,style:{width:'32px',height:'30px',border:'none',background:'none',cursor:'pointer',flexShrink:'0'}});colI.addEventListener('input',function(e){S.plans[pk].color=e.target.value;});colI.addEventListener('change',saveSettings);ph.appendChild(colI);card.appendChild(ph);
    var iw=h('div',{});
    function rbi(){
      iw.innerHTML='';(S.plans[pk].items||[]).forEach(function(item,idx){
        var ir=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'9px 14px',borderBottom:'1px solid var(--br)'}});
        ir.appendChild(h('div',{style:{width:'6px',height:'6px',borderRadius:'50%',background:S.plans[pk].color,flexShrink:'0'}}));ir.appendChild(h('span',{style:{flex:'1',fontSize:'13px',color:'var(--t2)'}},item));
        ir.appendChild(h('div',{style:{cursor:'pointer',color:'var(--t3)',padding:'4px',display:'flex',flexShrink:'0'},on:{click:async function(){S.plans[pk].items.splice(idx,1);await saveSettings();rbi();}}},[ic('x',{})]));iw.appendChild(ir);
      });
    }
    rbi();card.appendChild(iw);
    var ar=h('div',{style:{display:'flex',gap:'8px',padding:'10px 14px'}});
    var ai=h('input',{cls:'fi',placeholder:'Neuer Punkt ...',style:{flex:'1',padding:'9px 10px',fontSize:'13px'}});
    async function add(){var v=ai.value.trim();if(!v)return;S.plans[pk].items.push(v);await saveSettings();ai.value='';rbi();}
    ai.addEventListener('keydown',function(e){if(e.key==='Enter')add();});
    ar.appendChild(ai);ar.appendChild(h('div',{cls:'btn bp',style:{padding:'9px 14px',flexShrink:'0'},on:{click:add}},[ic('plus',{color:'white'})]));
    card.appendChild(ar);w.appendChild(card);
  });
  scr.appendChild(w);return scr;
}

// ── RENDER ──
function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.style.background='repeating-linear-gradient(135deg,transparent,transparent 24px,rgba(13,148,136,.025) 24px,rgba(13,148,136,.025) 48px)';
  if(!S.user){app.appendChild(buildLogin());return;}
  var scr;
  if(S.tab==='dashboard')scr=buildDash();
  else if(S.tab==='settings')scr=buildSettings();
  else{
    if(S.view==='list')scr=buildCustList();
    else if(S.view==='form')scr=buildCustForm();
    else if(S.view==='detail')scr=buildCustDetail();
    else if(S.view==='check')scr=buildCheckForm();
    else if(S.view==='history')scr=buildHistory();
    else scr=buildCustList();
  }
  app.appendChild(scr);
  var nav=h('nav',{cls:'nav'});
  [{id:'dashboard',ic:'chart',lbl:'Übersicht'},{id:'customers',ic:'users',lbl:'Kunden'},{id:'settings',ic:'cog',lbl:'Einstellungen'}].forEach(function(nb){
    nav.appendChild(h('div',{cls:'ni'+(S.tab===nb.id?' on':''),on:{click:function(){S.tab=nb.id;if(nb.id!=='settings')S.view='list';render();}}},[ic(nb.ic,{}),h('span',{},nb.lbl)]));
  });
  app.appendChild(nav);
  S.mods.forEach(function(m){
    if(m.t==='pin')app.appendChild(buildPin());
    else if(m.t==='confirm')app.appendChild(buildConfirm(m.d));
    else if(m.t==='photo')app.appendChild(buildPhotoMenu(m.d.itemId));
    else if(m.t==='pdfLang')app.appendChild(buildPdfLang(m.d.chk,m.d.cust));
    else if(m.t==='share')app.appendChild(buildShare());
  });
  if(S.settings&&S.settings.accentColor)document.documentElement.style.setProperty('--ac',S.settings.accentColor);
}

// ── BOOT ──
async function boot(){
  var app=document.getElementById('app');
  app.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;background:#060d14"><div class="sp"></div><div style="color:#8bafc4;font-size:14px;font-family:sans-serif">LMS Marine Service</div></div>';
  try{
    var res=await SB.auth.getSession();
    if(res.data&&res.data.session&&res.data.session.user){
      S.user=res.data.session.user;
      await loadData();
    }
  }catch(e){console.warn('boot:',e);}
  render();
  SB.auth.onAuthStateChange(async function(ev,session){
    if(ev==='SIGNED_IN'&&session&&session.user){S.user=session.user;await loadData();render();}
    else if(ev==='SIGNED_OUT'){S.user=null;S.customers=[];S.checks=[];render();}
  });
}

boot();
</script>
